<script>
 async function handleMobileRotation() {
  // 1. Check if it's a mobile device
  if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    return;
  }

  try {
    // 2. Request Fullscreen (Required for locking on most browsers)
    const docEl = document.documentElement;
    if (docEl.requestFullscreen) {
      await docEl.requestFullscreen();
    } else if (docEl.webkitRequestFullscreen) {
      /* Safari */
      await docEl.webkitRequestFullscreen();
    } else if (docEl.msRequestFullscreen) {
      /* IE11 */
      await docEl.msRequestFullscreen();
    }

    // 3. Lock Orientation to Landscape
    if (screen.orientation && screen.orientation.lock) {
      // 'landscape' locks to both primary or secondary
      await screen.orientation.lock('landscape');
      console.log("Locked to landscape");
    } else {
      console.warn("Screen Orientation API not supported.");
    }
  } catch (error) {
    console.error("Failed to rotate or go fullscreen:", error);
  }
}

 async function exitLandscapeAndRelease() {
  try {

    if (screen.orientation && screen.orientation.unlock) {
      screen.orientation.unlock();
      console.log("Orientation unlocked. Phone will now follow the sensor.");
    }

    // 2. Exit Fullscreen (Usually required to leave forced landscape)
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      if (document.exitFullscreen) {
        await document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        /* Safari */
        await document.webkitExitFullscreen();
      }
    }

    console.log("Successfully returned to original phase.");
  } catch (error) {
    // If it's already in the original phase/not fullscreen, it just lands here and does nothing.
    console.log("Phone was already in original phase or exit was not needed.");
  }
}

const ROAD_W = 14;          // road width
const BLOCK  = 70;          // block size (road center to road center)
const GRID   = 5;           // 5x5 road grid
const MAP_H  = BLOCK*(GRID-1); // 280 units total
const HALF   = MAP_H/2;     // 140

// Road center positions (-140,-70,0,70,140)
const ROADS  = Array.from({length:GRID},(_,i)=> -HALF + i*BLOCK);

// Physics constants

function makeRoadTexture() {
    const size = 512, blockPx = Math.round(size * BLOCK / (GRID*BLOCK + ROAD_W*2));
    const cv = document.createElement('canvas');
    cv.width = cv.height = size;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#2d2d2d'; ctx.fillRect(0,0,size,size);
    // draw road lines
    const roadPx = Math.round(size * ROAD_W / (GRID*BLOCK));
    const step = Math.round(size / (GRID-1));
    ROADS.forEach((_, i) => {
        const pos = Math.round((i/(GRID-1)) * size);
        // Road stripes
        ctx.fillStyle = '#fff';
        for (let d=0; d<size; d+=40) {
            ctx.fillRect(pos - roadPx/2 + roadPx*0.45, d, 4, 20);
            ctx.fillRect(d, pos - roadPx/2 + roadPx*0.45, 20, 4);
        }
        // Road edges
        ctx.fillStyle='#ffcc00';
        ctx.fillRect(pos - roadPx/2, 0, 3, size);
        ctx.fillRect(pos + roadPx/2 - 3, 0, 3, size);
        ctx.fillRect(0, pos - roadPx/2, size, 3);
        ctx.fillRect(0, pos + roadPx/2 - 3, size, 3);
    });
    return new THREE.CanvasTexture(cv);
}

function buildWorld() {
    const S=MAP_H+ROAD_W*2+60;
    const bMats=[0xc0392b,0x2980b9,0x27ae60,0xd35400,0x8e44ad,0x2c3e50,0x7f8c8d,0x16a085].map(col=>new THREE.MeshLambertMaterial({color:col}));
    const hutMat=new THREE.MeshLambertMaterial({color:0xd4a76a});
    const roofMat=new THREE.MeshLambertMaterial({color:0x6B3A2A});
    const treeMat=new THREE.MeshLambertMaterial({color:0x228822});
    const trunkMat=new THREE.MeshLambertMaterial({color:0x5D4037});
    const gMesh=new THREE.Mesh(new THREE.PlaneGeometry(S,S),new THREE.MeshLambertMaterial({color:0x3a7a1a}));
    gMesh.rotation.x=-Math.PI/2;gMesh.receiveShadow=true;scene.add(gMesh);
    const roadTex=makeRoadTexture();roadTex.wrapS=roadTex.wrapT=THREE.RepeatWrapping;
    const rMesh=new THREE.Mesh(new THREE.PlaneGeometry(S,S),new THREE.MeshLambertMaterial({map:roadTex,transparent:true,opacity:1,color:0x444444}));
    rMesh.rotation.x=-Math.PI/2;rMesh.position.y=0.01;rMesh.receiveShadow=true;scene.add(rMesh);
    let bIdx=0;
    for(let ri=0;ri<GRID-1;ri++){
        for(let ci=0;ci<GRID-1;ci++){
            const cx=(ROADS[ci]+ROADS[ci+1])/2,cz=(ROADS[ri]+ROADS[ri+1])/2;
            const maxW=BLOCK-ROAD_W-4,seed=ri*7+ci*13;
            if((ri+ci)%3===0){
                const nH=2+Math.floor(Math.abs(Math.sin(seed)*2));
                for(let h=0;h<nH;h++){
                    const hw=5+Math.abs(Math.sin(h*7+seed)*4),hd=5+Math.abs(Math.cos(h*5+seed)*4),ht=3+Math.abs(Math.sin(h*11)*2);
                    const ox=Math.sin(h*5+ri)*(maxW*0.3),oz=Math.cos(h*7+ci)*(maxW*0.3);
                    const hut=new THREE.Mesh(new THREE.BoxGeometry(hw,ht,hd),hutMat);
                    hut.position.set(cx+ox,ht/2,cz+oz);hut.castShadow=true;scene.add(hut);
                    buildings.push(new THREE.Box3(new THREE.Vector3(cx+ox-hw/2,0,cz+oz-hd/2),new THREE.Vector3(cx+ox+hw/2,ht,cz+oz+hd/2)));
                    const rf=new THREE.Mesh(new THREE.ConeGeometry(Math.max(hw,hd)*0.7,ht*0.7,6),roofMat);
                    rf.position.set(cx+ox,ht+ht*0.35,cz+oz);rf.castShadow=true;scene.add(rf);
                }
                for(let t=0;t<2;t++) addTree(cx+Math.sin(t*3.1+seed)*maxW*0.35,cz+Math.cos(t*2.9+seed)*maxW*0.35,treeMat,trunkMat);
            }else{
                const nB=2+Math.floor(Math.abs(Math.sin(seed)*2));
                for(let b=0;b<nB;b++){
                    const bw=7+Math.abs(Math.sin(b*11+seed)*9),bd=7+Math.abs(Math.cos(b*7+seed)*9),bh=8+Math.abs(Math.sin(b*13+seed)*20);
                    const ox=Math.sin(b*5+ri)*(maxW*0.33),oz=Math.cos(b*7+ci)*(maxW*0.33);
                    const m=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd),bMats[bIdx%bMats.length]);bIdx++;
                    m.position.set(cx+ox,bh/2,cz+oz);m.castShadow=true;m.receiveShadow=true;scene.add(m);
                    buildings.push(new THREE.Box3(new THREE.Vector3(cx+ox-bw/2,0,cz+oz-bd/2),new THREE.Vector3(cx+ox+bw/2,bh,cz+oz+bd/2)));
                }
            }
        }
    }
    ROADS.forEach(rx=>{for(let z=-HALF;z<=HALF;z+=30){if(ROADS.some(rz=>Math.abs(z-rz)<ROAD_W/2+2))continue;addTree(rx+ROAD_W/2+3,z,treeMat,trunkMat);if(Math.abs(rx)<HALF)addTree(rx-ROAD_W/2-3,z,treeMat,trunkMat);}});
    ROADS.forEach(rz=>{for(let x=-HALF;x<=HALF;x+=30){if(ROADS.some(rx=>Math.abs(x-rx)<ROAD_W/2+2))continue;addTree(x,rz+ROAD_W/2+3,treeMat,trunkMat);if(Math.abs(rz)<HALF)addTree(x,rz-ROAD_W/2-3,treeMat,trunkMat);}});
    [-HALF-ROAD_W,HALF+ROAD_W].forEach(x=>{buildings.push(new THREE.Box3(new THREE.Vector3(x-5,-1,-HALF-40),new THREE.Vector3(x+5,5,HALF+40)));});
    [-HALF-ROAD_W,HALF+ROAD_W].forEach(z=>{buildings.push(new THREE.Box3(new THREE.Vector3(-HALF-40,-1,z-5),new THREE.Vector3(HALF+40,5,z+5)));});
}

// ═══════════════════════════════════════════════════════════
function createVehicle(color, label) {
    const g = new THREE.Group();

    // Body
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.4, 0.7, 4.5),
        new THREE.MeshStandardMaterial({color, metalness:0.7, roughness:0.25})
    );
    body.position.y = 0.55; body.castShadow = true; g.add(body);

    // Cabin / windshield
    const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(2.0, 0.65, 2.2),
        new THREE.MeshStandardMaterial({color:0x111820, roughness:0.1, metalness:0.3})
    );
    cabin.position.set(0,1.03,-0.3); cabin.castShadow=true; g.add(cabin);

    // Spoiler
    const spoiler = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 0.1, 0.3),
        new THREE.MeshStandardMaterial({color, metalness:0.8, roughness:0.2})
    );
    spoiler.position.set(0,1.1,-2.1); g.add(spoiler);

    // Wheels
    const wGeo = new THREE.CylinderGeometry(0.44,0.44,0.38,16);
    wGeo.rotateZ(Math.PI/2);
    const wMat = new THREE.MeshStandardMaterial({color:0x111111,roughness:0.9});
    const hubMat = new THREE.MeshStandardMaterial({color:0xaaaaaa,metalness:0.9,roughness:0.1});
    [[1.15,0.44,1.5,'fl'],[-1.15,0.44,1.5,'fr'],[1.15,0.44,-1.5,'rl'],[-1.15,0.44,-1.5,'rr']].forEach(([wx,wy,wz,tag])=>{
        const w = new THREE.Mesh(wGeo, wMat); w.name=tag;
        w.position.set(wx,wy,wz); w.castShadow=true; g.add(w);
        const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.4,6), hubMat);
        hub.rotation.z = Math.PI/2; hub.position.set(wx+(wx>0?0.2:-0.2),wy,wz); g.add(hub);
    });

    // Headlights
    const hlMat = new THREE.MeshStandardMaterial({color:0xffffee, emissive:0xffffee, emissiveIntensity:2});
    [[0.7,0.6,2.25],[-0.7,0.6,2.25]].forEach(([hx,hy,hz])=>{
        const hl = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.25,0.1), hlMat);
        hl.position.set(hx,hy,hz); g.add(hl);
    });
    // Tail lights
    const tlMat = new THREE.MeshStandardMaterial({color:0xff2200, emissive:0xff2200, emissiveIntensity:1.5});
    [[0.7,0.6,-2.25],[-0.7,0.6,-2.25]].forEach(([tx,ty,tz])=>{
        const tl = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.2,0.1), tlMat);
        tl.position.set(tx,ty,tz); g.add(tl);
    });

    // Name label
    const cv = document.createElement('canvas'); cv.width=256; cv.height=64;
    const ctx = cv.getContext('2d');
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.roundRect(0,0,256,64,12); ctx.fill();
    ctx.font='bold 32px Segoe UI'; ctx.fillStyle='white'; ctx.textAlign='center';
    ctx.fillText(label||'', 128, 42);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true}));
    sp.position.y = 3.2; sp.scale.set(4,1,1); g.add(sp);

    return g;
}

// ═══════════════════════════════════════════════════════════
// AI CAR SYSTEM
// ═══════════════════════════════════════════════════════════
// Waypoints: intersections on road grid
const WP = [];
ROADS.forEach(z => ROADS.forEach(x => WP.push(new THREE.Vector3(x,0,z))));
// WP[row*GRID+col] = intersection

// Pre-defined AI routes (indices into WP)
const AI_ROUTES = [
    // Outer ring CCW
    [0,1,2,3,4, 9,14,19,24, 23,22,21,20, 15,10,5,0],
    // Inner ring CW
    [6,7,8, 13,18, 17,16, 11,6],
    // Cross H
    [10,11,12,13,14],
    // Diagonal-ish
    [0,6,12,18,24, 23,17,11,5, 4,3,2,1,0],
    // Vertical center
    [2,7,12,17,22, 23,18,13,8,3,2],
];

const AI_NAMES = ['CAR_BOT1','CAR_BOT2','CAR_BOT3','CAR_BOT4','CAR_BOT5'];
const AI_SPEEDS = [0.28,0.24,0.31,0.26,0.22];

function spawnAICars() {
    AI_ROUTES.forEach((route, i) => {
        const col = CAR_COLORS[(i+2) % CAR_COLORS.length];
        const mesh = createVehicle(col, '🤖 '+AI_NAMES[i].replace('CAR_',''));
        const startWP = WP[route[0]];
        mesh.position.set(startWP.x + (i%2===0?3:-3), 0.4, startWP.z);
        scene.add(mesh);

        aiCars.push({
            mesh,
            route,
            wpIdx: 1,
            speed: 0,
            targetSpeed: AI_SPEEDS[i],
            dir: 0,
            steer: 0,
            blocked: 0,
        });
    });
}

function updateAI() {
    aiCars.forEach((ai, idx) => {
        const cur = ai.mesh.position;
        const target = WP[ai.route[ai.wpIdx]];
        const dx = target.x - cur.x;
        const dz = target.z - cur.z;
        const dist = Math.sqrt(dx*dx + dz*dz);

        // Advance waypoint when close
        if (dist < 3.5) {
            ai.wpIdx = (ai.wpIdx+1) % ai.route.length;
        }

        // Steering toward waypoint
        const desiredDir = Math.atan2(dx, dz);
        let dA = desiredDir - ai.dir;
        while (dA > Math.PI) dA -= Math.PI*2;
        while (dA < -Math.PI) dA += Math.PI*2;
        ai.dir += Math.sign(dA) * Math.min(Math.abs(dA), 0.055);

        // Speed control
        const turnSharpness = Math.abs(dA);
        const targetSpd = turnSharpness > 0.4 ? ai.targetSpeed * 0.6 : ai.targetSpeed;
        ai.speed += (targetSpd - ai.speed) * 0.05;

        // Move
        const nx = cur.x + Math.sin(ai.dir) * ai.speed;
        const nz = cur.z + Math.cos(ai.dir) * ai.speed;

        // Simple collision avoid with player
        const pdx = playerCar ? playerCar.position.x - nx : 999;
        const pdz = playerCar ? playerCar.position.z - nz : 999;
        if (Math.sqrt(pdx*pdx+pdz*pdz) > 4) {
            ai.mesh.position.set(nx, 0.4, nz);
        }
        ai.mesh.rotation.y = ai.dir;

        // Wheel spin
        ai.mesh.children.forEach(ch => {
            if(ch.name&&ch.name.length===2) ch.rotation.x += ai.speed*3;
        });
    });
}

// ═══════════════════════════════════════════════════════════
// PHYSICS UPDATE
// ═══════════════════════════════════════════════════════════
function updatePhysics() {
    if (!playerCar) return;

    // Acceleration
    if (keys.up)   speed = Math.min(speed+ACCEL, MAX_SPD);
    else if(keys.down) speed = Math.max(speed-BRAKE, -MAX_REV);
    else speed *= (1-FRICTION);
    if (Math.abs(speed)<0.001) speed=0;

    // Steering (speed-sensitive)
    const spFactor = Math.min(Math.abs(speed)/MAX_SPD, 1);
    const maxSteer = STEER_MAX * (1 - spFactor*0.4);
    if (keys.left)  steer = Math.min(steer+0.005, maxSteer);
    else if(keys.right) steer = Math.max(steer-0.005, -maxSteer);
    else steer *= 0.75;

    carDir += steer * Math.sign(speed) * (0.5 + spFactor*1.5);

    // New position
    const nx = playerCar.position.x + Math.sin(carDir)*speed;
    const nz = playerCar.position.z + Math.cos(carDir)*speed;

    // Collision
    const hw=1.1, hd=2.1;
    const box = new THREE.Box3(
        new THREE.Vector3(nx-hw,0,nz-hd),
        new THREE.Vector3(nx+hw,1.5,nz+hd)
    );
    let hit=false;
    for(let b of buildings) { if(box.intersectsBox(b)){hit=true;break;} }

    if (!hit) {
        playerCar.position.set(nx, 0.4, nz);
    } else {
        speed *= -0.35;
    }

    // Body visual roll + pitch
    playerCar.rotation.y = carDir;
    const bodyMesh = playerCar.children[0]; // body
    if (bodyMesh) {
        bodyMesh.rotation.z = -steer * 3 * spFactor;
        bodyMesh.rotation.x = speed * 0.15;
    }

    // Wheel spin + front wheel steer
    playerCar.children.forEach(ch => {
        if (!ch.name || ch.name.length!==2) return;
        ch.rotation.x -= speed*3;
        if (ch.name[0]==='f') ch.rotation.y = -steer*8;
    });

    // Camera follow
    const camTarget = new THREE.Vector3(
        playerCar.position.x - Math.sin(carDir)*16,
        8,
        playerCar.position.z - Math.cos(carDir)*16
    );
    camera.position.lerp(camTarget, 0.08);
    camera.lookAt(new THREE.Vector3(
        playerCar.position.x + Math.sin(carDir)*4,
        0,
        playerCar.position.z + Math.cos(carDir)*4
    ));

    // Speedometer
    const kmh = Math.round(Math.abs(speed)*130);
    document.getElementById('speed-val').innerText = kmh;
    document.getElementById('gear-display').innerText = speed>0.02?'D':speed<-0.02?'R':'N';

    // Socket sync (throttled ~15fps)
    const now=Date.now();
    if (roomId && myId && now-lastSync>65) {
        lastSync=now;
        socket.emit('car:pos', { x:playerCar.position.x, z:playerCar.position.z, r:carDir });
    }
}

// ═══════════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════════
function drawMinimap() {
    if (!playerCar || !minimapCtx) return;
    const ctx = minimapCtx;
    const W=130, H=130, scale=W/(MAP_H+ROAD_W*4);
    ctx.clearRect(0,0,W,H);

    // Background
    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.beginPath(); ctx.arc(65,65,65,0,Math.PI*2); ctx.fill();
    ctx.clip();

    const cx=playerCar.position.x, cz=playerCar.position.z;
    const ox=W/2-cx*scale, oz=H/2-cz*scale;

    // Roads
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=ROAD_W*scale;
    ROADS.forEach(r=>{
        ctx.beginPath(); ctx.moveTo(r*scale+ox,-HALF*scale+oz); ctx.lineTo(r*scale+ox,HALF*scale+oz); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-HALF*scale+ox,r*scale+oz); ctx.lineTo(HALF*scale+ox,r*scale+oz); ctx.stroke();
    });

    // AI cars (orange dots)
    aiCars.forEach(ai=>{
        const ax=ai.mesh.position.x*scale+ox, az=ai.mesh.position.z*scale+oz;
        ctx.fillStyle='#ff8c00'; ctx.beginPath(); ctx.arc(ax,az,3.5,0,Math.PI*2); ctx.fill();
    });

    // Other players (blue dots)
    Object.values(otherCars).forEach(op=>{
        const px=op.position.x*scale+ox, pz=op.position.z*scale+oz;
        ctx.fillStyle='#3498db'; ctx.beginPath(); ctx.arc(px,pz,4,0,Math.PI*2); ctx.fill();
    });

    // Player (neon arrow)
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.rotate(-carDir);
    ctx.fillStyle='#00f3ff';
    ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(5,5); ctx.lineTo(0,2); ctx.lineTo(-5,5); ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Border
    ctx.strokeStyle='rgba(0,243,255,0.6)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(65,65,64,0,Math.PI*2); ctx.stroke();
}

// ═══════════════════════════════════════════════════════════
// MULTIPLAYER SYNC
// ═══════════════════════════════════════════════════════════
function syncOtherPlayers(playersData) {
    if (!playersData) return;
    Object.keys(playersData).forEach(pid => {
        if (pid===myId) return;
        const d = playersData[pid];
        if (!otherCars[pid]) {
            const col = CAR_COLORS[Object.keys(otherCars).length % CAR_COLORS.length];
            otherCars[pid] = createVehicle(col, d.n||pid);
            otherCars[pid].position.set(d.x||0, 0.4, d.z||0);
            scene.add(otherCars[pid]);
        } else {
            otherCars[pid].userData.tx = d.x||0;
            otherCars[pid].userData.tz = d.z||0;
            otherCars[pid].userData.tr = d.r||0;
        }
    });
    // Remove disconnected
    Object.keys(otherCars).forEach(pid => {
        if (!playersData[pid]) { scene.remove(otherCars[pid]); delete otherCars[pid]; }
    });
    // Update count
    document.getElementById('player-count').innerText = Object.keys(playersData).length + ' player(s)';
}

function lerpOtherCars() {
    Object.values(otherCars).forEach(op=>{
        if (op.userData.tx!==undefined) {
            op.position.x += (op.userData.tx - op.position.x)*0.15;
            op.position.z += (op.userData.tz - op.position.z)*0.15;
            op.rotation.y += (op.userData.tr - op.rotation.y)*0.15;
        }
    });
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
let lastTime = 0;
const _FRAME_MS = 1000 / 60;
function animate(t = 0) {
    requestAnimationFrame(animate);
    if (document.hidden) return;
    const dt = t - lastTime;
    if (dt < _FRAME_MS - 0.1) return; // 60fps lock
    lastTime = t;
    updatePhysics();
    updateAI();
    lerpOtherCars();
    drawMinimap();
    renderer.render(scene, camera);
}

function setupControls() {
    // Keyboard
    window.addEventListener('keydown', e=>{
        if(e.code==='KeyW'||e.code==='ArrowUp') keys.up=1;
        if(e.code==='KeyS'||e.code==='ArrowDown') keys.down=1;
        if(e.code==='KeyA'||e.code==='ArrowLeft') keys.left=1;
        if(e.code==='KeyD'||e.code==='ArrowRight') keys.right=1;
    });
    window.addEventListener('keyup', e=>{
        if(e.code==='KeyW'||e.code==='ArrowUp') keys.up=0;
        if(e.code==='KeyS'||e.code==='ArrowDown') keys.down=0;
        if(e.code==='KeyA'||e.code==='ArrowLeft') keys.left=0;
        if(e.code==='KeyD'||e.code==='ArrowRight') keys.right=0;
    });
    // Touch
    const tb=(id,k)=>{
        const el=document.getElementById(id);
        el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=1;el.classList.add('pressed');},{passive:false});
        el.addEventListener('touchend',e=>{e.preventDefault();keys[k]=0;el.classList.remove('pressed');},{passive:false});
    };
    tb('t-gas','up'); tb('t-brake','down'); tb('t-left','left'); tb('t-right','right');
    document.getElementById('touch-controls').style.display='flex';
}

let _carCreateTmo, _carJoinTmo;

function _carSt(msg, color) {
    const el = document.getElementById('lobby-status');
    if (el) { el.innerText = msg; el.style.color = color || '#00f3ff'; }
}
function _carBtn(id, disabled, text) {
    const b = document.getElementById(id); if (!b) return;
    b.disabled = disabled; if (text) b.innerText = text;
    b.style.opacity = disabled ? '0.5' : '1';
    b.style.cursor  = disabled ? 'not-allowed' : 'pointer';
}
function _carResetBtns() {
    _carBtn('btn-create', false, '🚀 CREATE ROOM');
    _carBtn('btn-join',   false, '🔑 JOIN ROOM');
}

socket.on('connect',       () => _carSt('✅ Connected to server.', '#2ecc71'));
socket.on('connect_error', err => {
    clearTimeout(_carCreateTmo); clearTimeout(_carJoinTmo); _carResetBtns();
    _carSt('❌ Cannot reach server: ' + (err.message || 'Network error') + '. Check internet or retry.', '#ff3366');
});
socket.on('disconnect', reason => {
    _carSt('⚠️ Disconnected: ' + reason + '. Reconnecting…', '#f39c12');
});

function createRoom() {
    _carBtn('btn-create', true, '⏳ Connecting…');
    _carSt('🔌 Connecting to game server…', '#00f3ff');
    _carCreateTmo = setTimeout(() => {
        _carResetBtns();
        _carSt('❌ Server timeout. It may be waking up (~30 s). Please retry.', '#ff3366');
    }, 15000);
    socket.emit('car:create', { playerName, color: CAR_COLORS[0] });
}
socket.on('car:created', ({ roomId: rid, myId: mid }) => {
    clearTimeout(_carCreateTmo);
    _carSt('✅ Room created! Share code: ' + rid, '#2ecc71');
    roomId = rid; myId = mid;
    document.getElementById('room-code-display').innerText = roomId;
    startGame(ROADS[0]+3, ROADS[0]+3);
});

function joinRoom() {
    const code = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!code || code.length < 4) { _carSt('❌ Enter a valid 4-character room code.', '#ff3366'); return; }
    _carBtn('btn-join', true, '⏳ Joining…');
    _carSt('🔌 Looking for room ' + code + '…', '#00f3ff');
    _carJoinTmo = setTimeout(() => {
        _carResetBtns();
        _carSt('❌ Server timeout. It may be waking up (~30 s). Please retry.', '#ff3366');
    }, 15000);
    socket.emit('car:join', { code, playerName, color: CAR_COLORS[1] });
}
socket.on('car:joined', ({ roomId: rid, myId: mid, players }) => {
    clearTimeout(_carJoinTmo);
    _carSt('✅ Joined room: ' + rid, '#2ecc71');
    roomId = rid; myId = mid;
    document.getElementById('room-code-display').innerText = roomId;
    syncOtherPlayers(players);
    startGame(ROADS[1]+3, ROADS[1]+3);
});
socket.on('car:error', msg => {
    clearTimeout(_carCreateTmo); clearTimeout(_carJoinTmo);
    _carResetBtns();
    _carSt('❌ ' + msg, '#ff3366');
});
socket.on('car:player-joined', ({ id, x, z, r, n, color }) => {
    if (!otherCars[id]) {
        const col = color || CAR_COLORS[Object.keys(otherCars).length % CAR_COLORS.length];
        otherCars[id] = createVehicle(col, n||id);
        otherCars[id].position.set(x||0, 0.4, z||0);
        scene.add(otherCars[id]);
        document.getElementById('player-count').innerText = (Object.keys(otherCars).length+1)+' player(s)';
    }
});
socket.on('car:pos', ({ id, x, z, r }) => {
    if (id === myId || !otherCars[id]) return;
    otherCars[id].userData.tx = x;
    otherCars[id].userData.tz = z;
    otherCars[id].userData.tr = r;
});
socket.on('car:player-left', ({ id }) => {
    if (otherCars[id]) { scene.remove(otherCars[id]); delete otherCars[id]; }
    document.getElementById('player-count').innerText = (Object.keys(otherCars).length+1)+' player(s)';
});

function startGame(spawnX, spawnZ) {
    const col = CAR_COLORS[(parseInt(myId.replace('p',''))-1)%CAR_COLORS.length];
    playerCar = createVehicle(col, playerName);
    playerCar.position.set(spawnX, 0.4, spawnZ);
    scene.add(playerCar);
    lastActivity = Date.now();
    document.getElementById('lobby').style.display='none';
    listenChat();
    document.getElementById('hud').style.display='block';
}

(function pingLoop(){

        .then(function(){
            var p=Math.round(performance.now()-t0); hist.push(p); if(hist.length>5)hist.shift();

            var b=document.getElementById('car-ping-badge'),m=document.getElementById('car-ping-ms');

            if(b&&m){m.innerText='999+';b.className='ping-badge ping-bad';}
        });
    }
    measure(); setInterval(measure,5000);
})();
