<script>
// === FPS LIMITER & VISIBILITY PAUSE ===
(function() {
    var TARGET_FPS = 60;
    var FRAME_DURATION = 1000 / TARGET_FPS;
    var lastFrame = 0;
    var paused = false;

    // Pause on tab switch
    document.addEventListener('visibilitychange', function() {
        paused = document.hidden;
        if (!paused) {
            lastFrame = performance.now(); // reset to avoid delta spikes
        }
    });

    // Override requestAnimationFrame to respect FPS and pause
    var originalRAF = window.requestAnimationFrame;
    window.requestAnimationFrame = function(callback) {
        if (paused) {
            // If paused, schedule a check when visible (do nothing until resume)
            return originalRAF(function() {});
        }
        var now = performance.now();
        var delta = now - lastFrame;
        if (delta >= FRAME_DURATION) {
            lastFrame = now - (delta % FRAME_DURATION);
            return originalRAF(callback);
        } else {
            // Wait until the next allowed frame
            return originalRAF(function(ts) {
                window.requestAnimationFrame(callback);
            });
        }
    };

    // Also patch setInterval if it's used for game updates (e.g., pacman)
    // We'll replace setInterval with a throttled version.
    var originalSetInterval = window.setInterval;
    window.setInterval = function(callback, interval, ...args) {
        if (interval < 20) {
            // For very short intervals, we might need to keep them, but we can add a check.
            // We'll keep the original but add a pause check.
            return originalSetInterval(function() {
                if (!paused) callback();
            }, interval);
        }
        return originalSetInterval(callback, interval);
    };

    console.log('✅ FPS limiter installed (60 FPS, visibility pause)');
})();
</script>

<script>
 async function exitLandscapeAndRelease() {
 try {
 
 if (screen.orientation && screen.orientation.unlock) {
 screen.orientation.unlock();
 console.log("Orientation unlocked. Phone will now follow the sensor.");
 }
 
 // 2. Exit Fullscreen (Usually required to leave forced landscape)
 if (document.fullscreenElement || document.webkitFullscreenElement) {
 if (document.exitFullscreen) {
 await document.exitFullscreen();
 } else if (document.webkitExitFullscreen) {
 /* Safari */
 await document.webkitExitFullscreen();
 }
 }
 
 console.log("Successfully returned to original phase.");
 } catch (error) {
 // If it's already in the original phase/not fullscreen, it just lands here and does nothing.
 console.log("Phone was already in original phase or exit was not needed.");
 }
 }
let scene,camera,renderer
let car,dir=0,speed=0
let keys={up:0,down:0,left:0,right:0}
let buildings=[],traffic=[],lights=[]
let crashShake=0

init()
setupControls()
animate()
document.addEventListener('touchstart',function _fT(){document.removeEventListener('touchstart',_fT);handleMobileRotation2();},{once:true,passive:true});
document.addEventListener('click',function _fC(){document.removeEventListener('click',_fC);handleMobileRotation2();},{once:true});

async function handleMobileRotation() {
  // 1. Check if it's a mobile device
  if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    return;
  }

  try {
    // 2. Request Fullscreen (Required for locking on most browsers)
    const docEl = document.documentElement;
    if (docEl.requestFullscreen) {
      await docEl.requestFullscreen();
    } else if (docEl.webkitRequestFullscreen) {
      /* Safari */
      await docEl.webkitRequestFullscreen();
    } else if (docEl.msRequestFullscreen) {
      /* IE11 */
      await docEl.msRequestFullscreen();
    }

    // 3. Lock Orientation to Landscape
    if (screen.orientation && screen.orientation.lock) {
      // 'landscape' locks to both primary or secondary
      await screen.orientation.lock('landscape');
      console.log("Locked to landscape");
    } else {
      console.warn("Screen Orientation API not supported.");
    }
  } catch (error) {
    console.error("Failed to rotate or go fullscreen:", error);
  }
}


function init(){
scene=new THREE.Scene()
scene.background=new THREE.Color(0x87ceeb)

camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,2000)

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
document.getElementById("game").appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,0.7))
let sun=new THREE.DirectionalLight(0xffffff,1)
sun.position.set(60,100,40)
scene.add(sun)

let ground=new THREE.Mesh(
new THREE.PlaneGeometry(4000,4000),
new THREE.MeshStandardMaterial({color:0x4caf50})
)
ground.rotation.x=-Math.PI/2
scene.add(ground)

createRoads()
createBuildings()
createTrafficLights()
createTrafficCars()
createCar()
}

function createRoads(){
    const roadMat = new THREE.MeshStandardMaterial({
        color: 0x222222,
        polygonOffset: true,
        polygonOffsetFactor: -1,
        polygonOffsetUnits: -4
    });

    for(let i=-2000;i<=2000;i+=80){
        const r1 = new THREE.Mesh(
            new THREE.PlaneGeometry(4000,24),
            roadMat
        );
        r1.rotation.x = -Math.PI/2;
        r1.position.set(0, 0.02, i); // ⬅ tiny Y offset
        scene.add(r1);

        const r2 = new THREE.Mesh(
            new THREE.PlaneGeometry(24,4000),
            roadMat
        );
        r2.rotation.x = -Math.PI/2;
        r2.position.set(i, 0.02, 0);
        scene.add(r2);
    }
}


function createBuildings(){
for(let x=-14;x<=14;x++){
for(let z=-14;z<=14;z++){
if(Math.abs(x)%2===0||Math.abs(z)%2===0) continue
let h=25+Math.random()*60
let b=new THREE.Mesh(
new THREE.BoxGeometry(26,h,26),
new THREE.MeshStandardMaterial({color:0xcfcfcf})
)
b.position.set(x*80,h/2,z*80)
scene.add(b)
buildings.push(new THREE.Box3().setFromObject(b))
}
}
}

function createTrafficLights(){
for(let i=-3;i<=3;i++){
let pole=new THREE.Mesh(
new THREE.CylinderGeometry(1,1,22),
new THREE.MeshStandardMaterial({color:0x333})
)
pole.position.set(i*160,11,-35)
scene.add(pole)

lights.push({state:2,timer:0}) // start green
}

setInterval(()=>{
lights.forEach(l=>{
l.timer++
if(l.timer>300){
l.state=(l.state+1)%3 // 0 red 1 yellow 2 green
l.timer=0
}
})
},100)
}

function createTrafficCars(){
    const types = ["sedan","suv","truck"];

    for(let i=0;i<8;i++){
        const type = types[Math.floor(Math.random()*types.length)];
        const color = new THREE.Color().setHSL(Math.random(),0.6,0.5);

        const t = createVehicle(type, color);
        t.position.set(-650 + i*120, 0.6, i%2 ? 80 : -80);

        // AI speed based on vehicle type
        t.userData.speed = 
            type === "truck" ? 0.18 :
            type === "suv"   ? 0.22 :
                              0.28;

        traffic.push(t);
        scene.add(t);
    }
}


function createVehicle(type, color) {
    const vehicle = new THREE.Group();

    let config = {
        body: [2.6, 0.8, 4.8],
        cabin: [2.2, 0.7, 2.2],
        wheelY: 0.4,
        maxSpeed: 2.2,
        accel: 0.035,
        height: 0.6
    };

    if (type === "suv") {
        config = {
            body: [2.8, 1.1, 5.2],
            cabin: [2.3, 0.9, 2.4],
            wheelY: 0.55,
            maxSpeed: 1.9,
            accel: 0.03,
            height: 0.75
        };
    }

    if (type === "truck") {
        config = {
            body: [3.2, 1.3, 7],
            cabin: [2.5, 1.1, 3],
            wheelY: 0.6,
            maxSpeed: 1.5,
            accel: 0.02,
            height: 0.8
        };
    }

    // BODY
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(...config.body),
        new THREE.MeshStandardMaterial({
            color,
            metalness: 0.6,
            roughness: 0.35
        })
    );
    body.position.y = config.body[1]/2 + config.height;
    vehicle.add(body);

    // CABIN
    const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(...config.cabin),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    cabin.position.set(
        0,
        body.position.y + config.cabin[1]/2,
        -0.3
    );
    vehicle.add(cabin);

    // WHEELS
    vehicle.userData.wheels = [];
    const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.45, 16);
    wheelGeo.rotateZ(Math.PI / 2);

    [[1.3,1.8],[-1.3,1.8],[1.3,-1.8],[-1.3,-1.8]].forEach(p=>{
        const w = new THREE.Mesh(
            wheelGeo,
            new THREE.MeshStandardMaterial({color:0x111})
        );
        w.position.set(p[0], config.wheelY, p[1]);
        vehicle.userData.wheels.push(w);
        vehicle.add(w);
    });

    // BRAKE LIGHTS
    vehicle.userData.brakes = [];
    [-0.8,0.8].forEach(x=>{
        const b = new THREE.Mesh(
            new THREE.BoxGeometry(0.4,0.2,0.1),
            new THREE.MeshBasicMaterial({color:0x330000})
        );
        b.position.set(x, body.position.y, -config.body[2]/2 - 0.05);
        vehicle.userData.brakes.push(b);
        vehicle.add(b);
    });

    vehicle.userData.stats = config;
    vehicle.position.y = config.height;
    return vehicle;
}


function createCar(){
    car = createVehicle("sedan", 0xff0000);
    scene.add(car);
}



let _lastFrameTime = 0;
function animate(ts){
requestAnimationFrame(animate);
if (ts - _lastFrameTime < 15.5) return; // 60fps lock (~16.67ms)
_lastFrameTime = ts;

// 🚗 PLAYER PHYSICS (FIXED)
let accel=0
if(keys.up) accel=0.035
if(keys.down) accel=-0.025

if(keys.up||keys.down) speed+=accel
else speed*=0.992

speed=Math.max(-1.2,Math.min(2.2,speed))

if(keys.left) dir+=0.035
if(keys.right) dir-=0.035

let nx=car.position.x+Math.sin(dir)*speed
let nz=car.position.z+Math.cos(dir)*speed

let carBox=new THREE.Box3(
new THREE.Vector3(nx-1.2,0,nz-2.5),
new THREE.Vector3(nx+1.2,2,nz+2.5)
)

let hit=false
buildings.forEach(b=>{if(carBox.intersectsBox(b)) hit=true})
traffic.forEach(t=>{
let tb=new THREE.Box3().setFromObject(t)
if(carBox.intersectsBox(tb)) hit=true
})

if(hit){
speed*=-0.35
crashShake=10
}else{
car.position.set(nx,0.6,nz)
}

car.rotation.y=dir

// 🚦 TRAFFIC AI
traffic.forEach(t=>{
    let stop=false;
    lights.forEach(l=>{
        if(l.state===0 && Math.abs(t.position.z)<15) stop=true;
    });

    t.userData.brakes.forEach(b=>{
        b.material.color.set(stop ? 0xff0000 : 0x330000);
    });

    if(!stop) t.position.x += t.userData.speed;
    if(t.position.x>650) t.position.x=-650;
});

// 📸 CAMERA
let camTarget=new THREE.Vector3(
car.position.x-Math.sin(dir)*12,
6,
car.position.z-Math.cos(dir)*12
)
camera.position.lerp(camTarget,0.1)

if(crashShake>0){
camera.position.x+=(Math.random()-0.5)*0.6
camera.position.y+=(Math.random()-0.5)*0.4
crashShake--
}

camera.lookAt(car.position)

document.getElementById("speed").innerText=Math.abs(speed*80|0)
renderer.render(scene,camera)
}

function setupControls(){
const bind=(id,key)=>{
let e=document.getElementById(id)
e.ontouchstart=e.onmousedown=ev=>{
ev.preventDefault();keys[key]=1}
e.ontouchend=e.onmouseup=()=>keys[key]=0
}
bind("gas","up")
bind("brake","down")
bind("left","left")
bind("right","right")

addEventListener("keydown",e=>{
if(e.key==="w")keys.up=1
if(e.key==="s")keys.down=1
if(e.key==="a")keys.left=1
if(e.key==="d")keys.right=1
})
addEventListener("keyup",()=>keys={up:0,down:0,left:0,right:0})
}

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight
camera.updateProjectionMatrix()
renderer.setSize(innerWidth,innerHeight)
})
function _exitFs(cb){if(document.fullscreenElement||document.webkitFullscreenElement){try{if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();}catch(e){}var done=false;function go(){if(done)return;done=true;cb();}setTimeout(go,400);document.addEventListener('fullscreenchange',go,{once:true});document.addEventListener('webkitfullscreenchange',go,{once:true});try{document.exitFullscreen();}catch(e){try{document.webkitExitFullscreen();}catch(e2){}}}else{cb();}}
</script>
