<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // SECURITY CHECK & FIREBASE VERIFICATION
        const storedName = localStorage.getItem('playerName');
        
        // Basic Local Check
        if (localStorage.getItem('isLoggedIn') !== 'true' || !storedName) {
            window.parent.postMessage('spa-back','*');
        } else {
            // Extra Protection: Check if user actually exists in Firebase
            const checkId = storedName.toLowerCase().trim();
            if (typeof db !== 'undefined' && db) {
                db.ref('users/' + checkId).once('value', snap => {
                    if (!snap.exists()) {
                        window.parent.postMessage({type:'notify',msg:'⛔ Access denied! Please re-login.',nt:'error'},'*');
                        localStorage.clear();
                        window.parent.postMessage('spa-back','*');
                    }
                });
            }
        }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            overflow: hidden;
            touch-action: none;
            font-family: 'Teko', sans-serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #70c5ce;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI OVERLAY */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LIVE SCORE */
        #score-display {
            display: none; /* Score now drawn on canvas — no DOM repaint = no blink */
        }

        /* START SCREEN */
        #start-message {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px #000;
            animation: float 2s infinite ease-in-out;
        }

        /* GAME OVER SCREEN */
        #game-over-box {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ded895;
            border: 2px solid #543847;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            min-width: 250px;
        }

        .go-title {
            color: #e65f28;
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 0 #000;
            line-height: 1;
        }

        .score-board {
            background: #d6cf7e;
            border: 2px solid #a89a57;
            margin: 15px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-around;
        }

        .score-item span {
            display: block;
            color: #e65f28;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-item strong {
            display: block;
            font-size: 2rem;
            color: white;
            text-shadow: 1px 1px 0 #000;
        }

        /* BUTTONS */
        .btn {
            background: #e65f28;
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            font-family: 'Teko', sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 0 #b3461a;
            transition: transform 0.1s;
            margin: 5px;
            text-decoration: none;
            display: inline-block;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-menu {
            background: #50b5da;
            box-shadow: 0 4px 0 #3a85a1;
        }
        
        .btn-rank {
            background: #f1c40f;
            box-shadow: 0 4px 0 #b7950b;
        }

        /* FLASH EFFECT */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            opacity: 0;
            pointer-events: none;
            transition: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(-55%); }
            50% { transform: translateY(-45%); }
        }
    </style>

<script>
// === FPS LIMITER & VISIBILITY PAUSE ===
(function() {
    var TARGET_FPS = 60;
    var FRAME_DURATION = 1000 / TARGET_FPS;
    var lastFrame = 0;
    var paused = false;

    // Pause on tab switch
    document.addEventListener('visibilitychange', function() {
        paused = document.hidden;
        if (!paused) {
            lastFrame = performance.now(); // reset to avoid delta spikes
        }
    });

    // Override requestAnimationFrame to respect FPS and pause
    var originalRAF = window.requestAnimationFrame;
    window.requestAnimationFrame = function(callback) {
        if (paused) {
            // If paused, schedule a check when visible (do nothing until resume)
            return originalRAF(function() {});
        }
        var now = performance.now();
        var delta = now - lastFrame;
        if (delta >= FRAME_DURATION) {
            lastFrame = now - (delta % FRAME_DURATION);
            return originalRAF(callback);
        } else {
            // Wait until the next allowed frame
            return originalRAF(function(ts) {
                window.requestAnimationFrame(callback);
            });
        }
    };

    // Also patch setInterval if it's used for game updates (e.g., pacman)
    // We'll replace setInterval with a throttled version.
    var originalSetInterval = window.setInterval;
    window.setInterval = function(callback, interval, ...args) {
        if (interval < 20) {
            // For very short intervals, we might need to keep them, but we can add a check.
            // We'll keep the original but add a pause check.
            return originalSetInterval(function() {
                if (!paused) callback();
            }, interval);
        }
        return originalSetInterval(callback, interval);
    };

    console.log('✅ FPS limiter installed (60 FPS, visibility pause)');
})();
</script>

        // Check for loading errors
        bgImg.onerror = function() { console.error("Error loading Background. Check filename case sensitivity!"); };
        birdImg.onerror = function() { console.error("Error loading Bird. Check filename case sensitivity!"); };

        // --- CONTROLS ---
        function commandHandler(e) {
            if (e.type === 'touchstart' || e.type === 'touchmove') e.preventDefault();

            switch (gameState.current) {
                case gameState.getReady:
                    gameState.current = gameState.game;
                    startMsg.style.display = "none";
                    break;
                case gameState.game:
                    bird.flap();
                    break;
                case gameState.over:
                    break;
            }
        }

        document.addEventListener("keydown", function (e) {
            if (e.code === "Space") commandHandler(e);
        });
        canvas.addEventListener("mousedown", commandHandler);
        canvas.addEventListener("touchstart", commandHandler, { passive: false });

        // --- GAME OBJECTS ---
        const bg = {
            draw: function () {
                // 1. SAFETY: Clear screen with Blue Color first
                // This ensures no trails appear even if image fails
                ctx.fillStyle = "#70c5ce";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 2. Draw Background Image on top (only if it loaded correctly)
                if (bgImg.complete && bgImg.naturalHeight !== 0) {
                    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                }
            }
        }

        const bird = {
            x: 50, y: 150, width: 34, height: 24, speed: 0, gravity: 0.25, jump: 4.6,
            draw: function () {
                let birdX = canvas.width * 0.1;
                this.x = birdX;
                let scale = Math.min(canvas.width, canvas.height) / 400;
                let drawW = this.width * scale;
                let drawH = this.height * scale;
                ctx.drawImage(birdImg, this.x - drawW / 2, this.y - drawH / 2, drawW, drawH);
            },
            flap: function () { this.speed = -this.jump; },
            update: function () {
                if (gameState.current == gameState.getReady) {
                    this.y = (canvas.height / 2) - 10 + Math.cos(frames / 15) * 5;
                } else {
                    this.speed += this.gravity;
                    this.y += this.speed;
                    if (this.y + this.height / 2 >= canvas.height) {
                        this.y = canvas.height - this.height / 2;
                        endGame();
                    }
                }
            }
        }

        const pipes = {
            position: [],
            draw: function () {
                let scale = Math.min(canvas.width, canvas.height) / 400;
                let pipeW = 52 * scale;
                let pipeH = 400 * scale;
                let gap = 120 * scale;
                let dx = 2 * scale;

                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    let topY = p.y;
                    let bottomY = p.y + pipeH + gap;

                    ctx.drawImage(pipeNorthImg, p.x, topY, pipeW, pipeH);
                    ctx.drawImage(pipeSouthImg, p.x, bottomY, pipeW, pipeH);

                    if (gameState.current == gameState.game) {
                        p.x -= dx;
                    }

                    if (p.x + pipeW <= 0) {
                        this.position.shift();
                        currentScore++;
                        // Score drawn on canvas in drawScore() — no DOM mutation needed
                    }

                    // COLLISION
                    let birdLeft = bird.x - (bird.width * scale) / 2 + 5;
                    let birdRight = bird.x + (bird.width * scale) / 2 - 5;
                    let birdTop = bird.y - (bird.height * scale) / 2 + 5;
                    let birdBottom = bird.y + (bird.height * scale) / 2 - 5;

                    let pipeLeft = p.x;
                    let pipeRight = p.x + pipeW;
                    let topPipeBottom = topY + pipeH;
                    let bottomPipeTop = bottomY;

                    if (birdRight > pipeLeft && birdLeft < pipeRight) {
                        if (birdTop < topPipeBottom || birdBottom > bottomPipeTop) {
                            endGame();
                        }
                    }
                }
            },
            update: function () {
                if (gameState.current !== gameState.game) return;
                if (frames % 120 == 0) {
                    let scale = Math.min(canvas.width, canvas.height) / 400;
                    let maxY = -100 * scale;
                    let minY = -300 * scale;
                    this.position.push({ x: canvas.width, y: Math.random() * (maxY - minY) + minY });
                }
            }
        }

        // --- END GAME FUNCTION ---
        function endGame() {
            if (gameState.current == gameState.over) return;

            gameState.current = gameState.over;

            // Flash Screen — set color+transition first, then trigger opacity
            flashEl.style.transition = "none";
            flashEl.style.background = "rgba(255,50,50,0.6)";
            flashEl.style.opacity = "0.7";
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    flashEl.style.transition = "opacity 0.3s ease-out";
                    flashEl.style.opacity = "0";
                    setTimeout(function() { flashEl.style.background = "transparent"; flashEl.style.transition = "none"; }, 350);
                });
            });

            // Update Local High Score
            if (currentScore > highScore) {
                highScore = currentScore;
                localStorage.setItem("flappyHighScore", highScore);
            }

            // --- SAVE TO CLOUD ---
            saveFlappyScoreToCloud(currentScore);

            // Show UI
            finalScoreEl.innerText = currentScore;
            bestScoreEl.innerText = highScore;
            gameOverBox.style.display = "block";
            uiScore.style.display = "none";
        }

        // Function called by the "RETRY" button
        window.resetGame = function () {
            pipes.position = [];
            bird.speed = 0;
            currentScore = 0;
            frames = 0;

            uiScore.innerText = "0";
            uiScore.style.display = "block";
            gameOverBox.style.display = "none";
            startMsg.style.display = "block";

            gameState.current = gameState.getReady;
        }

        // Draw score directly on canvas — eliminates DOM repaint white blink
        function drawScore() {
            if (gameState.current === gameState.over) return; // game-over box shows score
            var scale = Math.min(canvas.width, canvas.height) / 400;
            var fontSize = Math.round(52 * scale);
            ctx.save();
            ctx.font = 'bold ' + fontSize + 'px Teko, Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            // Black outline
            ctx.strokeStyle = 'rgba(0,0,0,0.8)';
            ctx.lineWidth = Math.max(3, scale * 4);
            ctx.strokeText(currentScore, canvas.width / 2, Math.round(18 * scale));
            // White fill
            ctx.fillStyle = 'white';
            ctx.fillText(currentScore, canvas.width / 2, Math.round(18 * scale));
            ctx.restore();
        }

        function loop() {
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            bg.draw();
            pipes.draw();
            pipes.update();
            bird.draw();
            bird.update();
            drawScore(); // on canvas — no DOM = no blink
            frames++;
            requestAnimationFrame(loop);
        }

        loop();

        // --- CLOUD SAVE FUNCTION ---
        // --- UPDATED CLOUD SAVE WITH DEBUG ALERTS ---
function saveFlappyScoreToCloud(finalScore) {
    const playerName = localStorage.getItem('playerName');
    if (!playerName) {
        window.parent.postMessage({type:'notify',msg:'❌ Not logged in! No player name found.',nt:'error'},'*');
        return;
    }
    const userId = playerName.toLowerCase().trim();
    const userRef = db.ref('users/' + userId);
    userRef.once('value', (snapshot) => {
        const data = snapshot.val() || {};
        const oldHigh = data.flappy_highscore || 0;
        if (finalScore > oldHigh) {
            window.parent.postMessage('score-syncing', '*');
            userRef.update({ flappy_highscore: finalScore, lastUpdated: Date.now() })
                .then(() => { window.parent.postMessage('score-saved', '*'); })
                .catch((error) => {
                    window.parent.postMessage({type:'notify',msg:'❌ Firebase Error: ' + error.message,nt:'error'},'*');
                });
        }
    });
}
